<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste de Carregamento — LK Moda</title>
  <style>
    body { font-family: Arial; background: #f5f5f5; margin: 0; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    .section { background: white; padding: 20px; margin: 20px 0; border-radius: 8px; border-left: 4px solid #c41e3a; }
    .section h3 { margin: 0 0 15px 0; color: #333; }
    .status { padding: 10px; margin: 5px 0; border-radius: 4px; font-family: monospace; font-size: 0.9rem; }
    .success { background: #d4edda; color: #155724; border-left: 3px solid #28a745; }
    .error { background: #f8d7da; color: #721c24; border-left: 3px solid #dc3545; }
    .warning { background: #fff3cd; color: #856404; border-left: 3px solid #ffc107; }
    .info { background: #d1ecf1; color: #0c5460; border-left: 3px solid #17a2b8; }
    code { background: #eee; padding: 2px 6px; border-radius: 3px; }
    button { padding: 10px 20px; background: #c41e3a; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
    button:hover { background: #a01830; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { text-align: left; padding: 10px; border-bottom: 1px solid #ddd; }
    th { background: #f9f9f9; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Teste de Carregamento — LK Moda</h1>
    
    <div class="section">
      <h3>📊 Status Geral</h3>
      <div id="general-status"></div>
    </div>

    <div class="section">
      <h3>🔐 Firebase</h3>
      <button onclick="testFirebase()">Testar Firebase</button>
      <div id="firebase-status"></div>
    </div>

    <div class="section">
      <h3>📦 Produtos</h3>
      <button onclick="testProducts()">Verificar Produtos</button>
      <div id="products-status"></div>
    </div>

    <div class="section">
      <h3>🛒 Carrinho</h3>
      <button onclick="testCart()">Verificar Carrinho</button>
      <div id="cart-status"></div>
    </div>

    <div class="section">
      <h3>🔑 Autenticação</h3>
      <button onclick="testAuth()">Verificar Auth</button>
      <div id="auth-status"></div>
    </div>

    <div class="section">
      <h3>💾 Storage Local</h3>
      <button onclick="testStorage()">Verificar Storage</button>
      <div id="storage-status"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-lkmodas.js"></script>
  <script src="script.js"></script>

  <script>
    function log(msg, type = 'info') {
      const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
      const colors = { success: '#28a745', error: '#dc3545', warning: '#ffc107', info: '#17a2b8' };
      console.log(`%c${icons[type]} ${msg}`, `color: ${colors[type]}; font-weight: bold; font-size: 1.1em`);
    }

    function addStatus(elementId, msg, type) {
      const el = document.getElementById(elementId);
      const div = document.createElement('div');
      div.className = `status ${type}`;
      div.textContent = msg;
      el.appendChild(div);
    }

    // Status geral
    window.addEventListener('load', () => {
      let html = '<div style="font-size: 0.95rem;">';
      
      html += `<div class="status ${window.FB ? 'success' : 'error'}">
        ${window.FB ? '✅' : '❌'} Firebase: ${window.FB ? 'Carregado' : 'Não Carregado'}
      </div>`;
      
      html += `<div class="status ${window.Products ? 'success' : 'error'}">
        ${window.Products ? '✅' : '❌'} Products API: ${window.Products ? 'Disponível' : 'Não disponível'}
      </div>`;
      
      html += `<div class="status ${window.__LK_PRODUCTS_CACHE?.length > 0 ? 'success' : 'warning'}">
        ${window.__LK_PRODUCTS_CACHE?.length > 0 ? '✅' : '⚠️'} Cache de Produtos: ${window.__LK_PRODUCTS_CACHE?.length || 0} itens
      </div>`;
      
      html += '</div>';
      document.getElementById('general-status').innerHTML = html;
      
      log('Página carregada', 'success');
    });

    window.testFirebase = () => {
      const el = document.getElementById('firebase-status');
      el.innerHTML = '';
      
      if (!window.FB) {
        addStatus('firebase-status', '❌ Firebase não carregado', 'error');
        return;
      }
      
      addStatus('firebase-status', '✅ Firebase carregado', 'success');
      
      if (window.FB.getCurrentUser) {
        const user = window.FB.getCurrentUser();
        addStatus('firebase-status', user ? `👤 Usuário logado: ${user.email}` : '🚪 Nenhum usuário logado', 'info');
      }
      
      log('Firebase OK', 'success');
    };

    window.testProducts = () => {
      const el = document.getElementById('products-status');
      el.innerHTML = '';
      
      if (!window.Products) {
        addStatus('products-status', '❌ Products API não disponível', 'error');
        return;
      }
      
      const products = window.Products.getAll();
      addStatus('products-status', `📦 Total de produtos: ${products.length}`, 'success');
      
      if (products.length > 0) {
        const table = `
          <table>
            <tr><th>ID</th><th>Nome</th><th>Preço</th><th>Estoque</th></tr>
            ${products.slice(0, 5).map(p => `
              <tr>
                <td>${p.id}</td>
                <td>${p.name}</td>
                <td>R$ ${p.price?.toFixed(2) || '0.00'}</td>
                <td>${p.stock || 0}</td>
              </tr>
            `).join('')}
            ${products.length > 5 ? `<tr><td colspan="4" style="text-align: center">... e mais ${products.length - 5} produtos</td></tr>` : ''}
          </table>
        `;
        el.innerHTML += table;
      } else {
        addStatus('products-status', '⚠️ Nenhum produto carregado', 'warning');
      }
      
      log(`Produtos OK: ${products.length} itens`, products.length > 0 ? 'success' : 'warning');
    };

    window.testCart = () => {
      const el = document.getElementById('cart-status');
      el.innerHTML = '';
      
      try {
        const cart = JSON.parse(sessionStorage.getItem('lkmodas_cart') || '[]');
        const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        
        addStatus('cart-status', `🛒 Itens no carrinho: ${cart.length}`, 'success');
        addStatus('cart-status', `💰 Total: R$ ${total.toFixed(2)}`, 'info');
        
        log(`Carrinho OK: ${cart.length} itens`, 'success');
      } catch (e) {
        addStatus('cart-status', `❌ Erro ao ler carrinho: ${e.message}`, 'error');
        log(`Erro no carrinho: ${e.message}`, 'error');
      }
    };

    window.testAuth = () => {
      const el = document.getElementById('auth-status');
      el.innerHTML = '';
      
      try {
        const session = JSON.parse(sessionStorage.getItem('lkmodas_session') || 'null');
        if (session) {
          addStatus('auth-status', `✅ Sessão ativa: ${session.name || session.email}`, 'success');
        } else {
          addStatus('auth-status', '🚪 Nenhuma sessão ativa', 'info');
        }
        
        if (window.FB?.getCurrentUser) {
          const user = window.FB.getCurrentUser();
          if (user) {
            addStatus('auth-status', `👤 Firebase: ${user.email}`, 'success');
          }
        }
        
        log('Auth OK', 'success');
      } catch (e) {
        addStatus('auth-status', `❌ Erro: ${e.message}`, 'error');
      }
    };

    window.testStorage = () => {
      const el = document.getElementById('storage-status');
      el.innerHTML = '';
      
      const keys = [
        'lkmodas_cart',
        'lkmodas_users',
        'lkmodas_session',
        'lkmodas_products',
        'lkmodas_orders',
        'lkmodas_admin'
      ];
      
      keys.forEach(key => {
        const value = sessionStorage.getItem(key);
        if (value) {
          try {
            const parsed = JSON.parse(value);
            const type = Array.isArray(parsed) ? `array[${parsed.length}]` : typeof parsed;
            addStatus('storage-status', `📦 ${key}: ${type}`, 'success');
          } catch {
            addStatus('storage-status', `📦 ${key}: string`, 'info');
          }
        }
      });
      
      log('Storage OK', 'success');
    };
  </script>
</body>
</html>
