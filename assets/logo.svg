<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Fundo transparente — sem rect de fundo -->

  <!-- Círculo externo (borda rose gold) -->
  <circle cx="100" cy="100" r="97" fill="#1a1a1a" stroke="#b8936a" stroke-width="2"/>
  <!-- Círculo interno (borda rose gold fina) -->
  <circle cx="100" cy="100" r="89" fill="none" stroke="#b8936a" stroke-width="1"/>

  <!-- X cruzado (linhas diagonais) -->
  <line x1="42" y1="42" x2="158" y2="158" stroke="#b8936a" stroke-width="1.5" opacity="0.7"/>
  <line x1="158" y1="42" x2="42" y2="158" stroke="#b8936a" stroke-width="1.5" opacity="0.7"/>

  <!-- Letras L e K -->
  <text x="34" y="125" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#c8c8c8" letter-spacing="-2">L</text>
  <text x="104" y="125" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#c8c8c8">K</text>

  <!-- Corona (crown) -->
  <g transform="translate(100,18) scale(0.55)" fill="#b8936a">
    <!-- Base da coroa -->
    <rect x="-38" y="38" width="76" height="14" rx="3"/>
    <!-- Pontas da coroa -->
    <polygon points="-38,38 -28,8 -18,28 0,-4 18,28 28,8 38,38"/>
    <!-- Bolinhas do topo -->
    <circle cx="-38" cy="8" r="5"/>
    <circle cx="0" cy="-4" r="6"/>
    <circle cx="38" cy="8" r="5"/>
    <!-- Detalhes base -->
    <rect x="-38" y="48" width="76" height="4" rx="2" opacity="0.6"/>
  </g>

  <!-- Seta/ramo inferior esquerdo -->
  <g transform="translate(58,148)" stroke="#b8936a" stroke-width="1.2" fill="none" opacity="0.8">
    <line x1="-18" y1="8" x2="18" y2="-8"/>
    <line x1="-10" y1="8" x2="-18" y2="0"/>
    <line x1="-18" y1="8" x2="-10" y2="0"/>
    <line x1="2" y1="2" x2="-4" y2="-4"/>
    <line x1="-4" y1="6" x2="-10" y2="0"/>
  </g>

  <!-- Seta/ramo inferior direito -->
  <g transform="translate(142,148)" stroke="#b8936a" stroke-width="1.2" fill="none" opacity="0.8">
    <line x1="-18" y1="-8" x2="18" y2="8"/>
    <line x1="10" y1="8" x2="18" y2="0"/>
    <line x1="18" y1="8" x2="10" y2="0"/>
    <line x1="-2" y1="2" x2="4" y2="-4"/>
    <line x1="4" y1="6" x2="10" y2="0"/>
  </g>

  <!-- EST 2017 -->
  <text x="100" y="170" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="600" fill="#c8c8c8" text-anchor="middle" letter-spacing="3">EST  2017</text>
</svg>
