<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecionando pedido...</title>
  <meta http-equiv="refresh" content="0; url=minha-conta.html">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Georgia, serif;
      background: #f6f3ec;
      color: #171717;
    }
    .box {
      width: min(92vw, 520px);
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      padding: 32px 28px;
      text-align: center;
      box-shadow: 0 18px 50px rgba(0,0,0,.08);
    }
    a { color: #b68a1f; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="box">
    <h1 style="margin:0 0 12px;font-size:2rem;">Acompanhamento do pedido</h1>
    <p style="margin:0 0 16px;color:#666;">Redirecionando para a sua conta para acompanhar o pedido em tempo real.</p>
    <p style="margin:0;"><a id="continue-link" href="minha-conta.html">Continuar</a></p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('id') || params.get('order') || '';
    const target = orderId ? `minha-conta.html?order=${encodeURIComponent(orderId)}` : 'minha-conta.html';
    document.querySelector('meta[http-equiv="refresh"]').setAttribute('content', `0; url=${target}`);
    document.getElementById('continue-link').href = target;
    window.location.replace(target);
  </script>
</body>
</html>
